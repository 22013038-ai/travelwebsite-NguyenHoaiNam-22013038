<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt tour</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>TRAVEL WEBSITE</header>

<nav>
    <a href="index.html">Trang chủ</a>
    <a href="tour.html">Tour</a>
    <a href="booking.html">Đặt tour</a>
</nav>

<h2>Đặt tour</h2>

<form onsubmit="return kiemTraForm()">
    <input type="text" id="name" placeholder="Họ tên"><br>
    <input type="text" id="phone" placeholder="SĐT"><br>
    <input type="email" id="email" placeholder="Email"><br>

    <select id="tour">
        <option value="">Chọn điểm đến</option>
        <option>Đà Lạt</option>
        <option>Phú Quốc</option>
    </select><br>

    <input type="date" id="date"><br>
    <input type="number" id="people" placeholder="Số người"><br>
    <textarea id="note" placeholder="Ghi chú"></textarea><br>

    <button type="submit">Đặt tour</button>
</form>

<p id="msg"></p>

<script src="scr.js"></script>
</body>
</html>
