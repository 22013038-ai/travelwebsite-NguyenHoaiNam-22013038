<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chọn tour yêu thích</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Chọn tour yêu thích</h1>

    <div class="container">

        <div class="tour" id="dalat">
            <h3>Tour Đà Lạt</h3>
            <p>Thành phố ngàn hoa, khí hậu mát mẻ.</p>
            <button onclick="chonTour('Đà Lạt', 'dalat')">Chọn tour</button>
        </div>

        <div class="tour" id="phuquoc">
            <h3>Tour Phú Quốc</h3>
            <p>Nghỉ dưỡng biển đảo, phù hợp cho gia đình.</p>
            <button onclick="chonTour('Phú Quốc', 'phuquoc')">Chọn tour</button>
        </div>

        <div class="tour" id="hanoi">
            <h3>Tour Hà Nội</h3>
            <p>Tham quan thủ đô, phố cổ và các di tích lịch sử.</p>
            <button onclick="chonTour('Hà Nội', 'hanoi')">Chọn tour</button>
        </div>

    </div>

    <p id="thongbao">Bạn chưa chọn tour nào.</p>
</body>
</html>
